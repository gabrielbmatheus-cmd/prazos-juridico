<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jurídico – Gestão de Prazos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: #F8FAFC; font-family: Inter, system-ui, sans-serif; color: #1E293B; }
  select, input, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #F1F5F9; } ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const today = new Date(); today.setHours(0,0,0,0);
const fmt = (d) => new Date(d).toLocaleDateString("pt-BR");

const CATS = ["Contratos","Cobranças","Distratos","Documentos","Notificações","Outro"];
const DIAS = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
const STATUS_SOL = ["Em andamento","Aguardando revisão","Concluído"];
const catColor = {"Contratos":"#8B5CF6","Cobranças":"#EF4444","Distratos":"#F97316","Documentos":"#6B7280","Notificações":"#3B82F6","Outro":"#94A3B8"};
const statusColor = {"Em andamento":"#3B82F6","Aguardando revisão":"#F59E0B","Concluído":"#10B981"};
const mondayStatusReverse = {"working_on_it":"Em andamento","stuck":"Aguardando revisão","done":"Concluído"};
const BOARD_NAME = "Solicitações Jurídicas";

function prazoStatus(dataStr) {
  if (!dataStr) return { label:"–", color:"#94A3B8", bg:"#F3F4F6" };
  const d = new Date(dataStr); d.setHours(0,0,0,0);
  const diff = Math.ceil((d - today) / (1000*60*60*24));
  if (diff < 0) return { label:"Vencido", color:"#EF4444", bg:"#FEE2E2" };
  if (diff === 0) return { label:"Hoje", color:"#DC2626", bg:"#FEE2E2" };
  if (diff === 1) return { label:"Amanhã", color:"#D97706", bg:"#FEF3C7" };
  if (diff <= 3) return { label:`${diff} dias`, color:"#D97706", bg:"#FEF3C7" };
  return { label:`${diff} dias`, color:"#6B7280", bg:"#F3F4F6" };
}
function isCritico(s) {
  if (s.status === "Concluído" || !s.prazoInterno) return false;
  const d = new Date(s.prazoInterno); d.setHours(0,0,0,0);
  return Math.ceil((d - today) / (1000*60*60*24)) <= 1;
}
function fromMondayDate(val) {
  if (!val) return "";
  try { const d = JSON.parse(val); return d.date || ""; } catch { return val || ""; }
}

async function mondayQuery(apiKey, query, variables = {}) {
  const res = await fetch("/api/monday", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query, variables, apiKey })
  });
  const data = await res.json();
  if (data.errors) throw new Error(data.errors[0].message);
  return data.data;
}

async function getOrCreateBoard(apiKey) {
  const data = await mondayQuery(apiKey, `{ boards(limit:50) { id name } }`);
  const existing = data.boards.find(b => b.name === BOARD_NAME);
  if (existing) return existing.id;
  const created = await mondayQuery(apiKey, `mutation { create_board(board_name: "${BOARD_NAME}", board_kind: public) { id } }`);
  const boardId = created.create_board.id;
  const cols = [
    { title:"Categoria", type:"text" },
    { title:"Prazo Interno", type:"date" },
    { title:"Prazo Externo", type:"date" },
    { title:"Observações", type:"text" },
    { title:"ID Externo", type:"text" },
  ];
  for (const col of cols) {
    await mondayQuery(apiKey, `mutation { create_column(board_id: ${boardId}, title: "${col.title}", column_type: ${col.type}) { id } }`);
  }
  return boardId;
}

async function fetchItems(apiKey, boardId) {
  const data = await mondayQuery(apiKey, `
    query {
      boards(ids: [${boardId}]) {
        items_page(limit: 200) {
          items { id name column_values { id text value } }
        }
      }
    }
  `);
  const items = data.boards[0]?.items_page?.items || [];
  return items.map(item => {
    const getByTitle = (title) => item.column_values.find(c => c.id.toLowerCase().replace(/_/g," ").includes(title.toLowerCase()));
    const piCol = getByTitle("prazo interno");
    const peCol = getByTitle("prazo externo");
    const catCol = getByTitle("categoria");
    const obsCol = getByTitle("observa");
    const extCol = getByTitle("id externo");
    const statusCol = item.column_values.find(c => c.id === "status");
    return {
      id: item.id, mondayId: item.id, titulo: item.name,
      categoria: catCol?.text || "Outro",
      status: mondayStatusReverse[statusCol?.text?.toLowerCase()?.replace(" ","_")] || statusCol?.text || "Em andamento",
      prazoInterno: fromMondayDate(piCol?.value) || piCol?.text || "",
      prazoExterno: fromMondayDate(peCol?.value) || peCol?.text || "",
      obs: obsCol?.text || "",
      externalId: extCol?.text || "",
    };
  });
}

async function createItem(apiKey, boardId, item) {
  const created = await mondayQuery(apiKey, `
    mutation($name: String!, $vals: JSON!) {
      create_item(board_id: ${boardId}, item_name: $name, column_values: $vals) { id }
    }
  `, {
    name: item.titulo,
    vals: JSON.stringify({
      "categoria": item.categoria,
      "prazo_interno": item.prazoInterno ? { date: item.prazoInterno } : null,
      "prazo_externo": item.prazoExterno ? { date: item.prazoExterno } : null,
      "observa__es": item.obs,
      "id_externo": item.externalId || "",
      "status": { label: item.status }
    })
  });
  return created.create_item.id;
}

async function updateItem(apiKey, boardId, mondayId, item) {
  await mondayQuery(apiKey, `
    mutation($id: ID!, $name: String!, $vals: JSON!) {
      change_multiple_column_values(item_id: $id, board_id: ${boardId}, column_values: $vals) { id }
      change_item_name(item_id: $id, board_id: ${boardId}, value: $name) { id }
    }
  `, {
    id: mondayId, name: item.titulo,
    vals: JSON.stringify({
      "categoria": item.categoria,
      "prazo_interno": item.prazoInterno ? { date: item.prazoInterno } : null,
      "prazo_externo": item.prazoExterno ? { date: item.prazoExterno } : null,
      "observa__es": item.obs,
      "status": { label: item.status }
    })
  });
}

async function deleteItem(apiKey, mondayId) {
  await mondayQuery(apiKey, `mutation { delete_item(item_id: ${mondayId}) { id } }`);
}

const inp = { width:"100%", padding:"9px 12px", borderRadius:"8px", border:"1px solid #E2E8F0", fontSize:"14px", outline:"none", fontFamily:"inherit", boxSizing:"border-box" };
const emptyForm = { titulo:"", categoria:"Contratos", status:"Em andamento", prazoInterno:"", prazoExterno:"", obs:"" };
const emptySemanForm = { titulo:"", dia:"Segunda" };

function Modal({ title, onClose, children }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
      <div style={{background:"#fff",borderRadius:"16px",width:"100%",maxWidth:"500px",padding:"28px",boxShadow:"0 20px 60px rgba(0,0,0,.2)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
          <span style={{fontWeight:700,fontSize:"16px"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:"#94A3B8",lineHeight:1,padding:0}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return (
    <div style={{marginBottom:"14px"}}>
      <label style={{fontSize:"12px",fontWeight:600,color:"#64748B",display:"block",marginBottom:"4px"}}>{label}</label>
      {children}
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = useState("");
  const [apiInput, setApiInput] = useState("");
  const [boardId, setBoardId] = useState(null);
  const [connecting, setConnecting] = useState(false);
  const [connError, setConnError] = useState("");
  const [aba, setAba] = useState("solicitacoes");
  const [solicitacoes, setSolicitacoes] = useState([]);
  const [semanais, setSemanais] = useState([]);
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [modalSol, setModalSol] = useState(false);
  const [modalSeman, setModalSeman] = useState(false);
  const [editSol, setEditSol] = useState(null);
  const [editSeman, setEditSeman] = useState(null);
  const [formSol, setFormSol] = useState(emptyForm);
  const [formSeman, setFormSeman] = useState(emptySemanForm);
  const [filtroStatus, setFiltroStatus] = useState("Todos");
  const [filtroCat, setFiltroCat] = useState("Todas");
  const [confirmDel, setConfirmDel] = useState(null);

  useEffect(() => {
    const k = localStorage.getItem("monday_key");
    const bid = localStorage.getItem("monday_board");
    if (k) { setApiKey(k); if (bid) { setBoardId(bid); loadItems(k, bid); } else { loadBoard(k); } }
    try { const s = localStorage.getItem("seman_v1"); if (s) setSemanais(JSON.parse(s)); } catch {}
  }, []);

  const loadBoard = async (key) => {
    setLoading(true); setConnError("");
    try {
      const bid = await getOrCreateBoard(key);
      setBoardId(bid); localStorage.setItem("monday_board", bid);
      await loadItems(key, bid);
    } catch(e) { setConnError("Erro ao conectar: " + e.message); }
    setLoading(false);
  };

  const loadItems = async (key, bid) => {
    setLoading(true);
    try { setSolicitacoes(await fetchItems(key, bid)); } catch(e) { console.error(e); }
    setLoading(false);
  };

  const connect = async () => {
    if (!apiInput.trim()) return;
    setConnecting(true); setConnError("");
    try {
      const bid = await getOrCreateBoard(apiInput.trim());
      setBoardId(bid);
      setSolicitacoes(await fetchItems(apiInput.trim(), bid));
      setApiKey(apiInput.trim());
      localStorage.setItem("monday_key", apiInput.trim());
      localStorage.setItem("monday_board", bid);
    } catch(e) { setConnError("Chave inválida ou sem permissão: " + e.message); }
    setConnecting(false);
  };

  const disconnect = () => {
    localStorage.removeItem("monday_key"); localStorage.removeItem("monday_board");
    setApiKey(""); setBoardId(null); setSolicitacoes([]);
  };

  const saveSeman = (data) => { setSemanais(data); localStorage.setItem("seman_v1", JSON.stringify(data)); };

  const openNewSol = () => { setEditSol(null); setFormSol(emptyForm); setModalSol(true); };
  const openEditSol = (s) => { setEditSol(s); setFormSol({...s}); setModalSol(true); };
  const submitSol = async () => {
    if (!formSol.titulo.trim() || !formSol.prazoInterno || !formSol.prazoExterno) return;
    setSaving(true);
    try {
      if (editSol?.mondayId) {
        await updateItem(apiKey, boardId, editSol.mondayId, formSol);
        setSolicitacoes(prev => prev.map(s => s.mondayId === editSol.mondayId ? { ...formSol, mondayId: editSol.mondayId, id: editSol.id } : s));
      } else {
        const newId = await createItem(apiKey, boardId, formSol);
        setSolicitacoes(prev => [...prev, { ...formSol, mondayId: newId, id: newId }]);
      }
      setModalSol(false);
    } catch(e) { alert("Erro ao salvar: " + e.message); }
    setSaving(false);
  };
  const deleteSol = async (s) => {
    setSaving(true);
    try { await deleteItem(apiKey, s.mondayId); setSolicitacoes(prev => prev.filter(x => x.mondayId !== s.mondayId)); }
    catch(e) { alert("Erro ao excluir: " + e.message); }
    setSaving(false); setConfirmDel(null);
  };
  const changeStatusSol = async (s, status) => {
    setSolicitacoes(prev => prev.map(x => x.mondayId === s.mondayId ? { ...x, status } : x));
    try { await updateItem(apiKey, boardId, s.mondayId, { ...s, status }); } catch {}
  };

  const openNewSeman = () => { setEditSeman(null); setFormSeman(emptySemanForm); setModalSeman(true); };
  const openEditSeman = (t) => { setEditSeman(t.id); setFormSeman({ titulo: t.titulo, dia: t.dia }); setModalSeman(true); };
  const submitSeman = () => {
    if (!formSeman.titulo.trim()) return;
    const updated = editSeman ? semanais.map(t => t.id === editSeman ? { ...t, ...formSeman } : t) : [...semanais, { ...formSeman, id: Date.now(), feito: false }];
    saveSeman(updated); setModalSeman(false);
  };
  const toggleSeman = (id) => saveSeman(semanais.map(t => t.id === id ? { ...t, feito: !t.feito } : t));
  const deleteSeman = (id) => { saveSeman(semanais.filter(t => t.id !== id)); setConfirmDel(null); };
  const resetSemana = () => saveSeman(semanais.map(t => ({ ...t, feito: false })));

  const criticos = solicitacoes.filter(isCritico);
  const solFiltradas = solicitacoes.filter(s =>
    (filtroStatus === "Todos" || s.status === filtroStatus) &&
    (filtroCat === "Todas" || s.categoria === filtroCat)
  ).sort((a,b) => new Date(a.prazoInterno) - new Date(b.prazoInterno));

  if (!apiKey) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#F8FAFC",fontFamily:"Inter,sans-serif",padding:"24px"}}>
      <div style={{background:"#fff",borderRadius:"16px",padding:"36px",maxWidth:"440px",width:"100%",boxShadow:"0 4px 24px rgba(0,0,0,.08)"}}>
        <div style={{width:"48px",height:"48px",background:"#EFF6FF",borderRadius:"12px",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"20px",fontSize:"24px"}}>⚖️</div>
        <h1 style={{fontSize:"20px",fontWeight:700,margin:"0 0 6px",color:"#0F172A"}}>Jurídico – Gestão de Prazos</h1>
        <p style={{fontSize:"13px",color:"#64748B",margin:"0 0 24px"}}>Conecte sua conta Monday para sincronizar as solicitações com sua equipe.</p>
        <Field label="Chave de API do Monday">
          <input type="password" style={inp} value={apiInput} onChange={e=>setApiInput(e.target.value)} placeholder="Cole sua chave aqui" onKeyDown={e=>e.key==="Enter"&&connect()} />
        </Field>
        {connError && <div style={{background:"#FEF2F2",color:"#DC2626",fontSize:"12px",padding:"8px 12px",borderRadius:"8px",marginBottom:"12px"}}>{connError}</div>}
        <button onClick={connect} disabled={connecting} style={{width:"100%",background:"#1D4ED8",color:"#fff",border:"none",borderRadius:"8px",padding:"11px",fontSize:"14px",cursor:"pointer",fontWeight:600,opacity:connecting?0.7:1}}>
          {connecting?"Conectando...":"Conectar ao Monday"}
        </button>
        <p style={{fontSize:"11px",color:"#94A3B8",marginTop:"12px",textAlign:"center"}}>A chave é salva apenas no seu navegador e nunca é compartilhada.</p>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:"960px",margin:"0 auto",padding:"32px 24px",minHeight:"100vh"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"24px",flexWrap:"wrap",gap:"8px"}}>
        <div>
          <h1 style={{fontSize:"22px",fontWeight:700,margin:0,color:"#0F172A"}}>Jurídico – Gestão de Prazos</h1>
          <p style={{color:"#64748B",fontSize:"13px",margin:"4px 0 0"}}>{today.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
        </div>
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          <span style={{fontSize:"11px",background:"#F0FDF4",color:"#15803D",padding:"4px 10px",borderRadius:"20px",fontWeight:600,border:"1px solid #BBF7D0"}}>● Monday conectado</span>
          <button onClick={()=>loadItems(apiKey,boardId)} disabled={loading} style={{background:"#F1F5F9",border:"none",borderRadius:"8px",padding:"7px 12px",fontSize:"12px",cursor:"pointer",color:"#475569"}}>{loading?"...":"↻ Atualizar"}</button>
          <button onClick={disconnect} style={{background:"#FEF2F2",border:"none",borderRadius:"8px",padding:"7px 12px",fontSize:"12px",cursor:"pointer",color:"#EF4444"}}>Desconectar</button>
        </div>
      </div>

      <div style={{display:"flex",gap:"10px",marginBottom:"24px",flexWrap:"wrap"}}>
        {[
          {label:"Prazos internos críticos",value:criticos.length,color:criticos.length>0?"#EF4444":"#10B981",bg:criticos.length>0?"#FEF2F2":"#F0FDF4"},
          {label:"Solicitações em aberto",value:solicitacoes.filter(s=>s.status!=="Concluído").length,color:"#3B82F6",bg:"#EFF6FF"},
          {label:"Atividades pendentes",value:semanais.filter(t=>!t.feito).length,color:"#F59E0B",bg:"#FFFBEB"},
        ].map((c,i)=>(
          <div key={i} style={{background:c.bg,border:`1px solid ${c.color}33`,borderRadius:"12px",padding:"14px 20px",flex:"1 1 160px"}}>
            <div style={{fontSize:"28px",fontWeight:700,color:c.color}}>{c.value}</div>
            <div style={{fontSize:"12px",color:"#64748B",marginTop:"2px"}}>{c.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:"4px",borderBottom:"2px solid #E2E8F0",marginBottom:"24px"}}>
        {[["solicitacoes","Solicitações"],["semanais","Atividades Semanais"]].map(([k,l])=>(
          <button key={k} onClick={()=>setAba(k)} style={{padding:"10px 20px",border:"none",background:"none",cursor:"pointer",fontWeight:aba===k?700:400,color:aba===k?"#1D4ED8":"#64748B",borderBottom:aba===k?"2px solid #1D4ED8":"2px solid transparent",marginBottom:"-2px",fontSize:"14px"}}>{l}</button>
        ))}
      </div>

      {aba==="solicitacoes"&&(
        <div>
          <div style={{display:"flex",gap:"8px",marginBottom:"16px",flexWrap:"wrap",alignItems:"center"}}>
            <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} style={{...inp,width:"auto",flex:"1 1 140px"}}>
              <option value="Todos">Todos os status</option>
              {STATUS_SOL.map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={filtroCat} onChange={e=>setFiltroCat(e.target.value)} style={{...inp,width:"auto",flex:"1 1 140px"}}>
              <option value="Todas">Todas as categorias</option>
              {CATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <button onClick={openNewSol} style={{background:"#1D4ED8",color:"#fff",border:"none",borderRadius:"8px",padding:"9px 18px",fontSize:"13px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>+ Nova solicitação</button>
          </div>
          {loading&&<div style={{textAlign:"center",color:"#94A3B8",padding:"48px 0"}}>Carregando do Monday...</div>}
          {!loading&&solFiltradas.length===0&&<div style={{textAlign:"center",color:"#94A3B8",padding:"64px 0",fontSize:"14px"}}>Nenhuma solicitação encontrada.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
            {solFiltradas.map(s=>{
              const pi=prazoStatus(s.prazoInterno),pe=prazoStatus(s.prazoExterno),crit=isCritico(s);
              return(
                <div key={s.mondayId} style={{background:"#fff",borderRadius:"12px",padding:"16px 20px",border:`1px solid ${crit?"#FECACA":"#E2E8F0"}`,opacity:s.status==="Concluído"?0.6:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"12px",flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px",flexWrap:"wrap"}}>
                        {s.externalId&&<span style={{fontSize:"11px",fontWeight:700,color:"#94A3B8",background:"#F1F5F9",padding:"1px 7px",borderRadius:"6px"}}>#{s.externalId}</span>}
                        <span style={{fontWeight:600,fontSize:"15px"}}>{s.titulo}</span>
                      </div>
                      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{background:(catColor[s.categoria]||"#94A3B8")+"18",color:catColor[s.categoria]||"#94A3B8",fontSize:"11px",fontWeight:600,padding:"2px 10px",borderRadius:"20px"}}>{s.categoria}</span>
                        <select value={s.status} onChange={e=>changeStatusSol(s,e.target.value)} style={{background:statusColor[s.status]+"18",color:statusColor[s.status],fontSize:"11px",fontWeight:600,padding:"2px 10px",borderRadius:"20px",border:"none",cursor:"pointer",outline:"none"}}>
                          {STATUS_SOL.map(st=><option key={st}>{st}</option>)}
                        </select>
                      </div>
                      {s.obs&&<div style={{fontSize:"12px",color:"#94A3B8",marginTop:"6px"}}>{s.obs}</div>}
                    </div>
                    <div style={{display:"flex",gap:"12px",alignItems:"center",flexShrink:0}}>
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:"10px",color:"#94A3B8",marginBottom:"3px"}}>Prazo interno</div>
                        <span style={{background:pi.bg,color:pi.color,fontSize:"12px",fontWeight:700,padding:"4px 12px",borderRadius:"8px",display:"block"}}>{pi.label}</span>
                        <div style={{fontSize:"10px",color:"#94A3B8",marginTop:"3px"}}>{s.prazoInterno?fmt(s.prazoInterno):"–"}</div>
                      </div>
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:"10px",color:"#94A3B8",marginBottom:"3px"}}>Prazo externo</div>
                        <span style={{background:pe.bg,color:pe.color,fontSize:"12px",fontWeight:600,padding:"4px 12px",borderRadius:"8px",display:"block"}}>{pe.label}</span>
                        <div style={{fontSize:"10px",color:"#94A3B8",marginTop:"3px"}}>{s.prazoExterno?fmt(s.prazoExterno):"–"}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                        <button onClick={()=>openEditSol(s)} style={{background:"#F1F5F9",border:"none",borderRadius:"6px",padding:"6px 12px",fontSize:"12px",cursor:"pointer",color:"#475569"}}>Editar</button>
                        <button onClick={()=>setConfirmDel({type:"sol",item:s,titulo:s.titulo})} style={{background:"#FEF2F2",border:"none",borderRadius:"6px",padding:"6px 12px",fontSize:"12px",cursor:"pointer",color:"#EF4444"}}>Excluir</button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {aba==="semanais"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"8px"}}>
            <span style={{fontSize:"13px",color:"#64748B"}}>Clique para marcar como concluído</span>
            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={resetSemana} style={{background:"#F1F5F9",color:"#475569",border:"none",borderRadius:"8px",padding:"9px 16px",fontSize:"13px",cursor:"pointer"}}>Reiniciar semana</button>
              <button onClick={openNewSeman} style={{background:"#1D4ED8",color:"#fff",border:"none",borderRadius:"8px",padding:"9px 16px",fontSize:"13px",cursor:"pointer",fontWeight:600}}>+ Nova atividade</button>
            </div>
          </div>
          {semanais.length===0&&<div style={{textAlign:"center",color:"#94A3B8",padding:"64px 0",fontSize:"14px"}}>Nenhuma atividade cadastrada.</div>}
          {DIAS.map(dia=>{
            const tarefas=semanais.filter(t=>t.dia===dia);
            if(!tarefas.length)return null;
            return(
              <div key={dia} style={{marginBottom:"20px"}}>
                <div style={{fontSize:"11px",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>{dia}</div>
                <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                  {tarefas.map(t=>(
                    <div key={t.id} style={{background:"#fff",borderRadius:"10px",padding:"12px 16px",border:"1px solid #E2E8F0",display:"flex",alignItems:"center",gap:"12px"}}>
                      <div onClick={()=>toggleSeman(t.id)} style={{width:"20px",height:"20px",borderRadius:"6px",border:`2px solid ${t.feito?"#10B981":"#CBD5E1"}`,background:t.feito?"#10B981":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer"}}>
                        {t.feito&&<span style={{color:"#fff",fontSize:"11px",fontWeight:700}}>✓</span>}
                      </div>
                      <span onClick={()=>toggleSeman(t.id)} style={{fontSize:"14px",flex:1,textDecoration:t.feito?"line-through":"none",color:t.feito?"#94A3B8":"#1E293B",cursor:"pointer"}}>{t.titulo}</span>
                      <button onClick={()=>openEditSeman(t)} style={{background:"none",border:"none",color:"#94A3B8",fontSize:"12px",cursor:"pointer",padding:"2px 8px"}}>Editar</button>
                      <button onClick={()=>setConfirmDel({type:"seman",id:t.id,titulo:t.titulo})} style={{background:"none",border:"none",color:"#EF4444",fontSize:"13px",cursor:"pointer",padding:"2px 8px"}}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modalSol&&(
        <Modal title={editSol?"Editar solicitação":"Nova solicitação"} onClose={()=>setModalSol(false)}>
          <Field label="Título *"><input style={inp} value={formSol.titulo} onChange={e=>setFormSol({...formSol,titulo:e.target.value})} placeholder="Descreva a solicitação" /></Field>
          <Field label="Categoria"><select style={inp} value={formSol.categoria} onChange={e=>setFormSol({...formSol,categoria:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></Field>
          <Field label="Status"><select style={inp} value={formSol.status} onChange={e=>setFormSol({...formSol,status:e.target.value})}>{STATUS_SOL.map(s=><option key={s}>{s}</option>)}</select></Field>
          <div style={{display:"flex",gap:"12px"}}>
            <Field label="Prazo interno *"><input type="date" style={inp} value={formSol.prazoInterno} onChange={e=>setFormSol({...formSol,prazoInterno:e.target.value})} /></Field>
            <Field label="Prazo externo *"><input type="date" style={inp} value={formSol.prazoExterno} onChange={e=>setFormSol({...formSol,prazoExterno:e.target.value})} /></Field>
          </div>
          <Field label="Observações"><textarea style={{...inp,resize:"vertical",minHeight:"72px"}} value={formSol.obs} onChange={e=>setFormSol({...formSol,obs:e.target.value})} placeholder="Informações adicionais (opcional)" /></Field>
          <div style={{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"4px"}}>
            <button onClick={()=>setModalSol(false)} style={{background:"#F1F5F9",border:"none",borderRadius:"8px",padding:"10px 20px",cursor:"pointer",fontSize:"14px"}}>Cancelar</button>
            <button onClick={submitSol} disabled={saving} style={{background:"#1D4ED8",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 20px",cursor:"pointer",fontSize:"14px",fontWeight:600,opacity:saving?0.7:1}}>{saving?"Salvando...":"Salvar"}</button>
          </div>
        </Modal>
      )}

      {modalSeman&&(
        <Modal title={editSeman?"Editar atividade":"Nova atividade semanal"} onClose={()=>setModalSeman(false)}>
          <Field label="Título *"><input style={inp} value={formSeman.titulo} onChange={e=>setFormSeman({...formSeman,titulo:e.target.value})} placeholder="Nome da atividade ou consulta" /></Field>
          <Field label="Dia da semana"><select style={inp} value={formSeman.dia} onChange={e=>setFormSeman({...formSeman,dia:e.target.value})}>{DIAS.map(d=><option key={d}>{d}</option>)}</select></Field>
          <div style={{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"4px"}}>
            <button onClick={()=>setModalSeman(false)} style={{background:"#F1F5F9",border:"none",borderRadius:"8px",padding:"10px 20px",cursor:"pointer",fontSize:"14px"}}>Cancelar</button>
            <button onClick={submitSeman} style={{background:"#1D4ED8",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 20px",cursor:"pointer",fontSize:"14px",fontWeight:600}}>Salvar</button>
          </div>
        </Modal>
      )}

      {confirmDel&&(
        <Modal title="Confirmar exclusão" onClose={()=>setConfirmDel(null)}>
          <p style={{fontSize:"14px",color:"#475569",marginTop:0}}>Tem certeza que deseja excluir <strong>"{confirmDel.titulo}"</strong>?</p>
          <div style={{display:"flex",gap:"8px",justifyContent:"flex-end"}}>
            <button onClick={()=>setConfirmDel(null)} style={{background:"#F1F5F9",border:"none",borderRadius:"8px",padding:"10px 20px",cursor:"pointer",fontSize:"14px"}}>Cancelar</button>
            <button onClick={()=>confirmDel.type==="sol"?deleteSol(confirmDel.item):deleteSeman(confirmDel.id)} style={{background:"#EF4444",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 20px",cursor:"pointer",fontSize:"14px",fontWeight:600}}>Excluir</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
